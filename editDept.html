<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <meta name="author" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<link href="vendors/css/bootstrap.css" rel="stylesheet" />
    <link href="vendors/css/jquery.mobile-1.4.5.css" rel="stylesheet" />
	<link href="vendors/css/bootstrap-select.css" rel="stylesheet" />
    <link href="css/style.css" rel="stylesheet" />
    <title>Kritzinger Company Directory</title>
</head>
<body onload="getDepartment()">
    <!-- start of "page_editDept" PAGE -->
    <div class="container">
        <div id="page_editDept" data-role="page">
            <div data-role="header" data-position="fixed" class="pt-2">
                <a href="./displayDept.html" data-rel="back" class="ui-btn ui-btn-left bton-icon-left icon-carat-l ui-btn-a">Cancel</a>
                <h1>Kritzinger</h1>
                <h2>Edit</h2>
                <br /><hr /><br />
                <a onclick="editDept()" id="ui-btn_updateDept" data-rel="back" class="ui-btn ui-btn-right icon-check ui-btn-a">Save</a>
            </div>
            <div class="content">
                <p class="hidden" id="deptID"></p>
                <h6>Department.</h6>
                <p contentEditable="true" id="dept"></p>
                <h6>Cost Center.</h6>
                <p contentEditable="true" id="costCenter"></p>
                <h6>Billing Code.</h6>
                <p contentEditable="true" id="billCode"></p>
                <h6>Location ID</h6>
                <p contentEditable="true" id="locationID"></p>
                <h6>Location.</h6>
                <p id="city"></p>
            </div>
            <br />
            <div class="popup pl-5" onclick="myPopup()">Delete Department
                <span class="popuptext" id="myPopup">
                    <div data-theme="a">
                        <h1>Delete Department.</h1>
                    </div>
                    <div role="main" class="content">
                        <h5 class="title">Are you sure you want to delete this Department.</h5>
                        <p>This action cannot be undone.</p>
                        <button class="btnCancel"><a data-role="button" data-inline="true" data-theme="a" data-rel="back" >Cancel</a></button>
                        <button class="btnDel"><a onclick="delDept()" id="ui-btn_delContact" data-inline="true" data-role="button" data-theme="a" data-transition="flow" >Delete</a></button>
                    </div>
                </span>
            </div>
        </div>
    </div>
    <!-- end of "page_editContact" PAGE -->

    <script src="vendors/js/jquery.js" type="text/javascript"></script>
    <script src="vendors/js/bootstrap.js" type="text/javascript"></script>
    <script src="js/main.js" type="text/javascript"></script>

</body>
</html>
